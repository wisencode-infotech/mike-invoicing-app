# Nginx server block for the Invoicing App (Laravel 13 + PHP-FPM).
#
# Install:
#   sudo cp deploy/nginx/invoicing-app.conf /etc/nginx/sites-available/invoicing-app.conf
#   sudo ln -s /etc/nginx/sites-available/invoicing-app.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace every occurrence of "your-domain.tld" and the PHP-FPM socket path
# below to match your server. Get the HTTPS certificate first (see
# docs/DEPLOYMENT.md "SSL / HTTPS") — the 443 block below assumes Certbot's
# default cert paths already exist; `certbot --nginx` will also happily
# rewrite this file's SSL directives for you if you'd rather bootstrap HTTP
# only and let Certbot add HTTPS itself.

# Plain HTTP: only serves ACME (Certbot) challenges and redirects everything
# else to HTTPS. Square webhooks, the customer portal, and Square's own
# hosted checkout all require a real https:// APP_URL — there is no
# supported way to run this app on HTTP in production.
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.tld;

    location /.well-known/acme-challenge/ {
        root /var/www/invoicing-app/public;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name your-domain.tld;

    root /var/www/invoicing-app/public;
    index index.php;

    # Certbot-managed certificate (see docs/DEPLOYMENT.md "SSL / HTTPS").
    ssl_certificate     /etc/letsencrypt/live/your-domain.tld/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.tld/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Baseline security headers — cheap insurance, no app-specific tuning needed.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    charset utf-8;

    # Company logo uploads and CSV product imports are both capped at 2MB by
    # the app's own validation (UpdateCompanySettingsRequest,
    # ImportProductsCsvRequest) — 10m leaves comfortable headroom without
    # opening the door to arbitrarily large uploads.
    client_max_body_size 10m;

    access_log /var/log/nginx/invoicing-app.access.log;
    error_log  /var/log/nginx/invoicing-app.error.log;

    # Never serve dotfiles (.env, .git, etc.) even if something ends up
    # inside the document root by mistake.
    location ~ /\. {
        deny all;
    }

    # Vite-built assets (public/build/**) are content-hashed — safe to cache
    # forever. Everything else in public/ falls through to the app.
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm-invoicing-app.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # PDF rendering (invoice/receipt) and CSV import run synchronously
        # in the request — dompdf on a modest VPS can take a few seconds
        # for a large invoice. The default 60s is usually fine; raise it
        # here (not just in php-fpm's request_terminate_timeout) if PDFs
        # are timing out.
        fastcgi_read_timeout 60s;
    }
}
