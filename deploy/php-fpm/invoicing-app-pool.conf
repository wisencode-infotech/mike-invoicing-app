; PHP-FPM pool for the Invoicing App — a dedicated pool (not the default
; "www" pool) so this app's PHP settings and process limits never
; accidentally affect anything else running on the same box.
;
; Install:
;   sudo cp deploy/php-fpm/invoicing-app-pool.conf /etc/php/8.3/fpm/pool.d/invoicing-app.conf
;   sudo systemctl restart php8.3-fpm
;
; The socket path here must match nginx's fastcgi_pass in
; deploy/nginx/invoicing-app.conf.

[invoicing-app]

user = www-data
group = www-data

listen = /run/php/php8.3-fpm-invoicing-app.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Dynamic sizing tuned for a small VPS (1-2GB RAM). Each PHP-FPM worker for
; this app typically sits well under 64MB; adjust pm.max_children upward on
; a bigger box, or if `journalctl -u php8.3-fpm` shows the pool exhausting
; its children under real traffic.
pm = dynamic
pm.max_children = 8
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 4
pm.max_requests = 500

; Required PHP extensions: pdo_mysql, mbstring, bcmath, fileinfo, openssl,
; ctype, xml — all standard with a normal `php8.3-fpm php8.3-mysql
; php8.3-mbstring php8.3-bcmath php8.3-xml php8.3-curl` install (see
; deploy/scripts/provision.sh). gd/imagick are NOT required — PDF
; generation (invoices/receipts) is pure-PHP via barryvdh/laravel-dompdf.

; PDF rendering and CSV import both run synchronously within a request and
; can be memory/time hungry for a large invoice or product list — these
; give real headroom over PHP's stock 128M/30s defaults without being
; reckless. Raise fastcgi_read_timeout in the nginx config to match if you
; raise max_execution_time further.
php_admin_value[memory_limit] = 256M
php_admin_value[max_execution_time] = 60
php_admin_value[upload_max_filesize] = 10M
php_admin_value[post_max_size] = 10M

; Never let a stray display_errors setting leak a stack trace in
; production — APP_DEBUG=false already prevents Laravel's own error pages
; from doing this, this is defense in depth at the PHP layer.
php_admin_value[display_errors] = off
php_admin_flag[log_errors] = on

; Opcache — a meaningful speedup for a framework this size; validate_timestamps
; is left on (checks mtimes) so a deploy's new code is picked up without a
; manual cache flush, at a small, worthwhile performance cost.
php_admin_flag[opcache.enable] = on
php_admin_value[opcache.memory_consumption] = 128
php_admin_value[opcache.max_accelerated_files] = 20000
php_admin_flag[opcache.validate_timestamps] = on
php_admin_value[opcache.revalidate_freq] = 2
